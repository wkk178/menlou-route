<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D展厅 | 门楼层记</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    :root{--door-gray: #6B5B4F;--brick-green: #4A6B5A;--accent-gold: #C9A86C;--bg-cream: #F5F1E8;--text-dark: #2C2420;--white: #FFFFFF;}
    *{margin: 0;padding: 0;box-sizing: border-box;}
    body{font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;background: var(--bg-cream);display: flex;flex-direction: column;height: 100vh;}
    
    /* 统一导航栏样式 */
    .navbar{position: fixed;top: 0;width: 100%;padding: 15px 50px;background: rgba(245, 241, 232, 0.98);backdrop-filter: blur(12px);z-index: 1000;box-shadow: 0 2px 20px rgba(107, 91, 79, 0.15);display: flex;justify-content: space-between;align-items: center;}
    .logo-container{display: flex;align-items: center;gap: 15px;}
    .logo-placeholder{width: 60px;height: 60px;background: linear-gradient(135deg, var(--door-gray), var(--brick-green));border-radius: 12px;display: flex;align-items: center;justify-content: center;font-size: 32px;box-shadow: 0 4px 12px rgba(107, 91, 79, 0.3);}
    .brand-text h1{font-size: 24px;font-weight: 700;color: var(--door-gray);letter-spacing: 2px;}
    .brand-text p{font-size: 12px;color: var(--brick-green);font-style: italic;}
    .nav-links{display: flex;gap: 30px;}
    .nav-links a{text-decoration: none;color: var(--text-dark);font-weight: 500;transition: all 0.3s;padding: 8px 16px;border-radius: 8px;}
    .nav-links a:hover,.nav-links a.active{background: var(--door-gray);color: var(--white);}

    .main-content{margin-top: 90px; flex-grow: 1; display: flex; flex-direction: column;}
    
    /* 3D 视图区域 */
    model-viewer { width: 100%; flex-grow: 1; background: radial-gradient(#ffffff, #e2ddd3); outline: none; }
    
    /* 信息卡片 */
    .info-card{
        background: white; 
        padding: 25px; 
        border-radius: 24px 24px 0 0; 
        box-shadow: 0 -10px 30px rgba(0,0,0,0.05); 
        z-index: 10;
        max-height: 45vh; 
        overflow-y: auto;
    }
    .gate-title{color: var(--door-gray); margin-bottom: 5px; font-size: 22px; display: flex; align-items: center; gap: 10px;}
    .demo-badge{font-size: 11px; background: var(--accent-gold); color: white; padding: 3px 8px; border-radius: 4px;}
    
    /* 音频播放器区域 */
    .audio-section {
        margin: 15px 0;
        padding: 12px;
        background: #f9f6f0;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    .audio-label { font-size: 12px; color: var(--door-gray); font-weight: bold; display: flex; align-items: center; gap: 5px; }
    audio { width: 100%; height: 35px; }

    /* 文字内容样式 */
    .desc-content { color: #444; line-height: 1.8; font-size: 14px; white-space: pre-wrap; margin-top: 10px;}
    .section-header { font-weight: bold; color: var(--brick-green); margin-top: 15px; display: block; border-left: 3px solid var(--brick-green); padding-left: 8px; margin-bottom: 5px;}

    @media (max-width: 768px){
      .navbar{padding: 12px 15px; height: 70px;}
      .main-content{margin-top: 70px;}
      .logo-placeholder{width: 45px;height: 45px;font-size: 24px;}
      .brand-text h1{font-size: 18px;}
      .nav-links{gap: 5px;}
      .nav-links a{padding: 6px 8px;font-size: 12px;}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo-container" onclick="window.location.href='index.html'">
      <div class="logo-placeholder">🏮</div>
      <div class="brand-text">
        <h1>门楼里</h1>
        <p>层记西四，阅见古今</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="quiz.html">智能推荐</a>
      <a href="map.html">数字导览</a>
      <a href="gate-3d.html" class="active">3D展厅</a>
      <a href="route.html">我的路线</a>
      <a href="about.html">项目介绍</a>
    </div>
  </nav>

  <div class="main-content">
    <model-viewer id="gate-viewer" src="demo.glb" auto-rotate camera-controls shadow-intensity="1" ar loading="eager" interaction-prompt="auto"></model-viewer>
    
    <div class="info-card">
      <h2 class="gate-title">
        <span id="m-title">金柱大门 · 数字化档案</span>
        <span class="demo-badge">技术原型展示</span>
      </h2>
      
      <div class="audio-section">
        <span class="audio-label">🎧 听·胡同里的金柱门往事</span>
        <audio id="gate-audio" src="n3.mp3" controls></audio>
      </div>

      <div id="m-desc" class="desc-content"></div>
      
      <button onclick="window.location.href='map.html'" style="width:100%; margin-top:20px; padding:15px; border:none; background:var(--door-gray); color:white; border-radius:12px; cursor:pointer; font-weight:bold; font-size: 16px;">返回数字导览</button>
    </div>
  </div>

  <script>
    // 解析网址参数
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // 内容数据库：金柱大门作为终极兜底内容
    const db = {
      "N3": {
        title: "13号院 · 金柱大门",
        audio: "n3.mp3",
        desc: `金柱大门属于屋宇式大门，门扇设置在中柱与前檐柱之间的金柱上。相对于广亮大门宽绰的门前空间，金柱大门的门前空间较少，其形制等级低于广亮大门。\n\n<span class="section-header">文化典故：分寸之间</span>\n明嘉靖年间，西四胡同有位五品官建宅，工匠问门制，他指着金柱说：“门扉安此处，外浅内深——少张扬，多自省。”门成，刻“静以修身”。后来人见金柱门皆道：这门不在阔气，在分寸。\n\n<span class="section-header">胡同记忆：打水的故事</span>\n家里的自来水不出水，要去36号院打水。老师家访时正好看见我去拎水，第二天在全班表扬。那时候冬天窗户上都是冰花，中午才化。洗澡还要去领澡票。\n\n<span class="section-header">胡同记忆：邻居丁阿姨</span>\n邻居丁阿姨总说自己“没啥可讲”，但大家记她唱歌识谱，自带文艺气质。国庆演出时，她清亮的歌声回荡在整条胡同里，那是胡同里最动听的声音。`
      },
      "B1": { title: "无问西东 (北155号)", audio: "n3.mp3", desc: "门楼文化的商业转译点。通过 3D 展示现代精酿空间与传统门楼结构的共生美学。" },
      "N1": { title: "圣祚隆长寺山门", audio: "n3.mp3", desc: "明代山门。随墙门形制，内置乾隆诗碑的数字化复原展示。" },
      "N2": { title: "马福祥宅 11 号院", audio: "n3.mp3", desc: "广亮大门典型。通过 3D 拆解可清晰查看门簪、雀替及极其考究的牡丹砖雕。" }
    };

    // 核心逻辑：如果找不到 ID 或没有 ID，统一指向 N3
    let content = db[id] ? db[id] : db["N3"];
    
    // 渲染标题和文字
    document.getElementById('m-title').innerHTML = content.title;
    document.getElementById('m-desc').innerHTML = content.desc;
    
    // 强制加载音频
    const player = document.getElementById('gate-audio');
    player.src = content.audio;
    
    // 强制加载模型
    document.getElementById('gate-viewer').src = "demo.glb";
  </script>
</body>
</html>
