<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D展厅 | 门楼层记</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{--door-gray: #6B5B4F;--brick-green: #4A6B5A;--accent-gold: #C9A86C;--bg-cream: #F5F1E8;--text-dark: #2C2420;--white: #FFFFFF;}
    *{margin: 0;padding: 0;box-sizing: border-box;}
    body{font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;background: var(--bg-cream);display: flex;flex-direction: column;height: 100vh;}
    
    /* 统一导航栏样式 - 对标 index.html */
    .navbar{position: fixed;top: 0;width: 100%;padding: 15px 50px;background: rgba(245, 241, 232, 0.98);backdrop-filter: blur(12px);z-index: 1000;box-shadow: 0 2px 20px rgba(107, 91, 79, 0.15);display: flex;justify-content: space-between;align-items: center;}
    .logo-container{display: flex;align-items: center;gap: 15px;}
    .logo-placeholder{width: 60px;height: 60px;background: linear-gradient(135deg, var(--door-gray), var(--brick-green));border-radius: 12px;display: flex;align-items: center;justify-content: center;font-size: 32px;box-shadow: 0 4px 12px rgba(107, 91, 79, 0.3);}
    .brand-text h1{font-size: 24px;font-weight: 700;color: var(--door-gray);letter-spacing: 2px;}
    .brand-text p{font-size: 12px;color: var(--brick-green);font-style: italic;}
    .nav-links{display: flex;gap: 30px;}
    .nav-links a{text-decoration: none;color: var(--text-dark);font-weight: 500;transition: all 0.3s;padding: 8px 16px;border-radius: 8px;}
    .nav-links a:hover,.nav-links a.active{background: var(--door-gray);color: var(--white);}

    .main-content{margin-top: 100px; flex-grow: 1; display: flex; flex-direction: column;}
    model-viewer { width: 100%; flex-grow: 1; background: radial-gradient(#ffffff, #e2ddd3); }
    .info-card{background: white; padding: 25px; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 10;}
    .gate-title{color: var(--door-gray); margin-bottom: 10px; font-size: 24px;}
    
    @media (max-width: 768px){
      .navbar{padding: 12px 15px;}
      .logo-placeholder{width: 45px;height: 45px;font-size: 24px;}
      .brand-text h1{font-size: 18px;}
      .nav-links{gap: 5px;}
      .nav-links a{padding: 6px 8px;font-size: 12px;}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo-container">
      <div class="logo-placeholder">🏮</div>
      <div class="brand-text">
        <h1>门楼里</h1>
        <p>层记西四，阅见古今</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="quiz.html">智能推荐</a>
      <a href="map.html">数字导览</a>
      <a href="gate-3d.html" class="active">3D展厅</a>
      <a href="route.html">我的路线</a>
      <a href="about.html">项目介绍</a>
    </div>
  </nav>

  <div class="main-content">
    <!-- 3D 核心组件 -->
    <model-viewer id="gate-viewer" src="" auto-rotate camera-controls shadow-intensity="1" ar loading="eager"></model-viewer>
    
    <div class="info-card">
      <h2 id="m-title" class="gate-title">请从数字导览地图进入</h2>
      <p id="m-desc" style="color:#666; line-height:1.6;"></p>
      <button onclick="window.location.href='map.html'" style="width:100%; margin-top:20px; padding:15px; border:none; background:var(--door-gray); color:white; border-radius:12px; cursor:pointer; font-weight:bold;">返回地图选择门楼</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const db = {
      "B1": { title: "无问西东 (北155号)", desc: "门楼文化的商业转译点。通过 3D 展示现代精酿空间与传统门楼结构的共生美学。" },
      "N1": { title: "圣祚隆长寺山门", desc: "明代山门。随墙门形制，内置乾隆诗碑的数字化复原展示。" },
      "N2": { title: "马福祥宅 11 号院", desc: "广亮大门典型。通过 3D 拆解可清晰查看门簪、雀替及极其考究的牡丹砖雕。" }
    };
    if(db[id]) {
      document.getElementById('m-title').innerText = db[id].title;
      document.getElementById('m-desc').innerText = db[id].desc;
      // 在此处填入你的 .glb 模型链接
      // document.getElementById('gate-viewer').src = `models/${id.toLowerCase()}.glb`;
    }
  </script>
</body>
</html>
